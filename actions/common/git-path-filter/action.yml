# =============================================================================
# FILE_NAME: action.yml
# DESCRIPTION: Composite action wrapper for main.py (installs deps, runs detection, exposes outputs).
# VERSION: 1.0.0
# EXIT_CODES/SIGNALS: N/A
# AUTHORS: Platform / DevOps
# =============================================================================

name: 'Git Path Filter'
description: 'Detects files changes between two refs (YAML glob groups, ** and ! last-match-wins); ref-agnostic, pull_request and push'
inputs:
  source_branch:
    description: 'Source/head ref (branch, tag, or SHA). Required when auto_detect_refs is false; ignored when true.'
    required: false
    default: ''
  base_ref_branch:
    description: 'Base ref (branch, tag, or SHA; no origin/ prefix). Required when auto_detect_refs is false; ignored when true.'
    required: false
    default: ''
  pattern_filter:
    description: 'YAML string defining filter groups (key -> list of globs; ! = exclude)'
    required: true
  github_token:
    description: 'GitHub Token for git operations'
    required: false
    default: ${{ github.token }}
  change_types:
    description: 'Optional comma-separated A,M,D to filter by status (e.g. A,M = added/modified only)'
    required: false
    default: ''
  debug:
    description: 'Set to true to log include/exclude reason per file'
    required: false
    default: 'false'
  working_directory:
    description: 'Base path for patterns; only paths under this dir are considered; matching is relative to this dir'
    required: false
    default: ''
  auto_detect_refs:
    description: 'When true, composite auto-detects source/base refs from GitHub event context (push, pull_request, workflow_dispatch).'
    required: false
    default: 'false'
outputs:
  changes:
    description: 'JSON array of keys that have changes'
    value: ${{ steps.detect.outputs.changes }}
  changes_json:
    description: 'Full details (has_changes, files, every_file_matches) for all keys including _unmatched'
    value: ${{ steps.detect.outputs.changes_json }}
  source_ref:
    description: 'Resolved source ref actually passed to git-path-filter (branch name or SHA).'
    value: ${{ steps.set-refs.outputs.source || inputs.source_branch }}
  base_ref:
    description: 'Resolved base ref actually passed to git-path-filter (branch name or SHA).'
    value: ${{ steps.set-refs.outputs.base || inputs.base_ref_branch }}
runs:
  using: "composite"
  steps:
    - name: Auto-detect source/base refs from event
      if: ${{ inputs.auto_detect_refs == 'true' }}
      id: set-refs
      env:
        EVENT_NAME: ${{ github.event_name }}
        REF: ${{ github.ref }}
        REF_NAME: ${{ github.ref_name }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        HEAD_REF: ${{ github.head_ref }}
        BASE_REF: ${{ github.base_ref }}
        SHA: ${{ github.sha }}
        BEFORE: ${{ github.event.before }}
      run: |
        set -euo pipefail

        # Resolve first parent to a plain 40-char SHA. Never pass "sha^" to main.py —
        # git fetch origin cannot fetch parent syntax, and GITHUB_OUTPUT/^ are fragile.
        resolve_first_parent() {
          local tip="$1"
          local parent=""
          git fetch --no-tags --deepen=1 origin 2>/dev/null || true
          git fetch --no-tags origin "${tip}" 2>/dev/null || true
          if parent="$(git rev-parse --verify "${tip}^" 2>/dev/null)"; then
            printf '%s\n' "${parent}"
            return 0
          fi
          if parent="$(git rev-parse --verify "${tip}~1" 2>/dev/null)"; then
            printf '%s\n' "${parent}"
            return 0
          fi
          echo "::error::[GIT-PATH-FILTER] Could not resolve parent of ${tip}. Use actions/checkout with fetch-depth: 0 (full history)." >&2
          return 1
        }

        source_ref=""
        base_ref=""

        if [ "${EVENT_NAME}" = "pull_request" ]; then
          source_ref="${HEAD_REF}"
          base_ref="${BASE_REF}"
        elif [ "${EVENT_NAME}" = "push" ]; then
          if [ "${REF}" = "refs/heads/${DEFAULT_BRANCH}" ] || [ "${REF}" = "refs/heads/main" ]; then
            source_ref="${SHA}"
            if [ -n "${BEFORE}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ]; then
              base_ref="${BEFORE}"
            else
              base_ref="$(resolve_first_parent "${SHA}")"
            fi
          else
            branch="${REF#refs/heads/}"
            source_ref="${branch}"
            base_ref="${DEFAULT_BRANCH}"
          fi
        else
          # workflow_dispatch / schedule / etc.
          if [ "${REF_NAME}" = "${DEFAULT_BRANCH}" ] || [ "${REF_NAME}" = "main" ]; then
            source_ref="${SHA}"
            base_ref="$(resolve_first_parent "${SHA}")"
          else
            source_ref="${REF_NAME}"
            base_ref="${DEFAULT_BRANCH}"
          fi
        fi

        echo "[GIT-PATH-FILTER] auto_detect event=${EVENT_NAME} source=${source_ref} base=${base_ref}"

        {
          echo "source=${source_ref}"
          echo "base=${base_ref}"
        } >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Install Python dependencies
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        pip install -r "${ACTION_PATH}/requirements.txt"

    - name: Write filter spec to file
      shell: bash
      env:
        PATTERN_FILTER: ${{ inputs.pattern_filter }}
      run: |
        set -euo pipefail
        printf '%s\n' "${PATTERN_FILTER}" > filter_spec.yaml

    - name: Run detection script
      id: detect
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        BASE_REF: ${{ steps.set-refs.outputs.base || inputs.base_ref_branch }}
        SOURCE_REF: ${{ steps.set-refs.outputs.source || inputs.source_branch }}
        CHANGE_TYPES: ${{ inputs.change_types }}
        DEBUG_FLAG: ${{ inputs.debug }}
        WORKING_DIR: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        export PYTHONUNBUFFERED=1
        EXTRA_ARGS=()
        [ -n "${CHANGE_TYPES}" ] && EXTRA_ARGS+=(--change-types "${CHANGE_TYPES}")
        [ "${DEBUG_FLAG}" = "true" ] && EXTRA_ARGS+=(--debug)
        [ -n "${WORKING_DIR}" ] && EXTRA_ARGS+=(--working-directory "${WORKING_DIR}")
        python3 -u "${ACTION_PATH}/main.py" \
          --base-ref "${BASE_REF}" \
          --source-ref "${SOURCE_REF}" \
          --filter-spec "filter_spec.yaml" \
          "${EXTRA_ARGS[@]}"