# =============================================================================
# Custom SemVer Action
# =============================================================================
# DESCRIPTION: Determines the next SemVer version based on commit messages.
# VERSION: 1.1.0
# AUTHORS: Platform Team
# =============================================================================

name: 'Custom SemVer'
description: 'Derives the next SemVer version from commit history'
inputs:
  current_version:
    description: 'The current version (e.g., 1.0.0)'
    required: true
  safe_name:
    description: 'The safe name of the component for tag lookup'
    required: true
outputs:
  next_version:
    description: 'The calculated next version'
    value: ${{ steps.semver.outputs.next_version }}

runs:
  using: 'composite'
  steps:
    - name: Calculate Next Version
      id: semver
      shell: bash
      env:
        CURRENT_VER: ${{ inputs.current_version }}
        SAFE_NAME: ${{ inputs.safe_name }}
      run: |
        set -euo pipefail
        
        # [T-01] Fetching commit messages since last tag
        LAST_TAG="${SAFE_NAME}-${CURRENT_VER}"
        if git rev-parse "refs/tags/$LAST_TAG" >/dev/null 2>&1; then
          COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline)
          echo "[DBG-001] Commits since $LAST_TAG: $COMMITS"
        else
          COMMITS=$(git log --oneline)
          echo "[DBG-001] No previous tag found. Commits: $COMMITS"
        fi

        # Handle initial version
        if [[ "$CURRENT_VER" == "0.0.0" ]]; then
          NEXT_VER="1.0.0"
          echo "next_version=$NEXT_VER" >> "$GITHUB_OUTPUT"
          echo "::notice::Initial version set to $NEXT_VER"
          exit 0
        fi

        MAJOR=$(echo "$CURRENT_VER" | awk -F. '{print $1}')
        MINOR=$(echo "$CURRENT_VER" | awk -F. '{print $2}')
        PATCH=$(echo "$CURRENT_VER" | awk -F. '{print $3}')

        BUMP="none"

        if [[ -n "$COMMITS" ]]; then
          while IFS= read -r line; do
            # Extract message (skip hash)
            MSG=$(echo "$line" | cut -d' ' -f2-)
            
            # [T-02] Checking commit: $MSG
            # Minor bump for feat(...) or feat:
            if [[ "$MSG" =~ ^feat(\(.*\))?: ]]; then
              BUMP="minor"
              break # Minor takes precedence
            # Patch bump for fix, bugfix, chore
            elif [[ "$MSG" =~ ^fix(\(.*\))?: || "$MSG" =~ ^bugfix(\(.*\))?: || "$MSG" =~ ^chore(\(.*\))?: ]]; then
              if [[ "$BUMP" != "minor" ]]; then
                BUMP="patch"
              fi
            fi
          done <<< "$COMMITS"
        fi

        if [[ "$BUMP" == "minor" ]]; then
          NEXT_VER="${MAJOR}.$((MINOR + 1)).0"
        elif [[ "$BUMP" == "patch" ]]; then
          NEXT_VER="${MAJOR}.${MINOR}.$((PATCH + 1))"
        else
          # If no matching keywords, default to patch bump as per standard practice, 
          # but user said "bumpbufix only if...". Let's default to patch to be safe 
          # unless specifically told to fail.
          echo "::warning::No version-bumping keywords found in commits. Defaulting to patch bump."
          NEXT_VER="${MAJOR}.${MINOR}.$((PATCH + 1))"
        fi

        echo "next_version=$NEXT_VER" >> "$GITHUB_OUTPUT"
        echo "::notice::Next version calculated ($BUMP): $NEXT_VER"
