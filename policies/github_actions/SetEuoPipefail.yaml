metadata:
  id: CKV2_SPVS_2
  name: "SPVS: All run blocks must include set -euo pipefail for fail-fast shell execution"
  category: SUPPLY_CHAIN
  guideline: "Start every shell run block with set -euo pipefail."
definition:
  or:
    - cond_type: attribute
      resource_types:
        - steps
      attribute: run
      operator: not_exists
    - cond_type: attribute
      resource_types:
        - steps
      attribute: run
      operator: regex_match
      value: "(?s).*set\\s+-euo\\s+pipefail"
