metadata:
  id: CKV2_SPVS_7
  name: "SPVS: Prohibit static cloud credential environment variables; use OIDC"
  category: IAM
  guideline: "Do not set AWS/GCP/Azure credential env vars; use OIDC federation."
definition:
  and:
    - or:
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_exists
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_contains
          value: "AWS_ACCESS_KEY_ID"
    - or:
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_exists
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_contains
          value: "AWS_SECRET_ACCESS_KEY"
    - or:
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_exists
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_contains
          value: "AWS_SESSION_TOKEN"
    - or:
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_exists
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_contains
          value: "GCP_SERVICE_ACCOUNT_KEY"
    - or:
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_exists
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_contains
          value: "GOOGLE_APPLICATION_CREDENTIALS"
    - or:
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_exists
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_contains
          value: "AZURE_CLIENT_SECRET"
    - or:
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_exists
        - cond_type: attribute
          resource_types:
            - steps
          attribute: env
          operator: not_contains
          value: "ARM_CLIENT_SECRET"
