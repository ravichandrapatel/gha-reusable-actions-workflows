metadata:
  id: CKV2_SPVS_3
  name: "SPVS: Prohibit set -x / xtrace in run blocks; use structured logging instead"
  category: SUPPLY_CHAIN
  guideline: "Do not enable xtrace in CI; use prefixed log helpers (log_info, log_error)."
definition:
  or:
    - cond_type: attribute
      resource_types:
        - steps
      attribute: run
      operator: not_exists
    - cond_type: attribute
      resource_types:
        - steps
      attribute: run
      operator: not_regex_match
      value: "(?s).*(set\\s+-x|set\\s+-o\\s+xtrace|\\bxtrace\\b)"
