metadata:
  id: CKV2_SPVS_11
  name: "SPVS: Jobs with contents write must declare a GitHub environment gate"
  category: IAM
  guideline: "Use environment: for jobs that mutate repository state or use write scopes."
definition:
  or:
    - cond_type: attribute
      resource_types:
        - jobs
      attribute: permissions.contents
      operator: not_equals
      value: "write"
    - cond_type: attribute
      resource_types:
        - jobs
      attribute: environment
      operator: exists
