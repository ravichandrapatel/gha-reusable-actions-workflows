metadata:
  id: CKV2_SPVS_9
  name: "SPVS: Top-level permissions must not grant write scopes (fork PR secret restriction)"
  category: IAM
  guideline: "Use read-only workflow defaults; grant write only on specific jobs."
definition:
  and:
    - cond_type: attribute
      resource_types:
        - permissions
      attribute: permissions.contents
      operator: not_equals
      value: "write"
    - cond_type: attribute
      resource_types:
        - permissions
      attribute: permissions.packages
      operator: not_equals
      value: "write"
    - cond_type: attribute
      resource_types:
        - permissions
      attribute: permissions.id-token
      operator: not_equals
      value: "write"
    - cond_type: attribute
      resource_types:
        - permissions
      attribute: permissions.security-events
      operator: not_equals
      value: "write"
    - cond_type: attribute
      resource_types:
        - permissions
      attribute: permissions.deployments
      operator: not_equals
      value: "write"
