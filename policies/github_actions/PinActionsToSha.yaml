metadata:
  id: CKV2_SPVS_5
  name: "SPVS: Action refs must use SHA, ./ local path, or internal /actions/ tags"
  category: SUPPLY_CHAIN
  guideline: >-
    Third-party actions (e.g. actions/checkout@v6) require a 40-char SHA.
    Internal monorepo actions under /actions/ may use semver or stable v-tags
    (e.g. @v1, @1.2.3, @component-v1). Same-repo paths use ./ only.
definition:
  or:
    - cond_type: attribute
      resource_types:
        - steps
      attribute: uses
      operator: not_exists
    - cond_type: attribute
      resource_types:
        - steps
      attribute: uses
      operator: starting_with
      value: "./"
    - cond_type: attribute
      resource_types:
        - steps
      attribute: uses
      operator: starting_with
      value: "docker://"
    - cond_type: attribute
      resource_types:
        - steps
      attribute: uses
      operator: regex_match
      value: ".*@[0-9a-fA-F]{40}(\\s|$|#)"
    - cond_type: attribute
      resource_types:
        - steps
      attribute: uses
      operator: regex_match
      value: "^[^@]+/actions/.+@(v[0-9]+|[0-9]+\\.[0-9]+\\.[0-9]+|[A-Za-z0-9._-]+-v[0-9]+)$"
