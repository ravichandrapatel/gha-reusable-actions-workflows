metadata:
  id: CKV2_SPVS_15
  name: "SPVS: Prohibit pull_request_target triggers (fork PR secret exposure risk)"
  category: IAM
  guideline: >-
    Do not use pull_request_target unless strictly required; prefer pull_request
    with explicit permissions and no fork secret access.
definition:
  or:
    - cond_type: attribute
      resource_types:
        - "on"
      attribute: "on"
      operator: not_exists
    - cond_type: attribute
      resource_types:
        - "on"
      attribute: "on"
      operator: not_contains
      value: pull_request_target
