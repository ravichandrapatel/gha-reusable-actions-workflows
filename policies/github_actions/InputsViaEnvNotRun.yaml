metadata:
  id: CKV2_SPVS_6
  name: "SPVS: Workflow inputs must be mapped to env, never interpolated in run strings"
  category: SUPPLY_CHAIN
  guideline: "Map ${{ inputs.* }} and ${{ github.event.inputs.* }} to env: and use shell variables."
definition:
  or:
    - cond_type: attribute
      resource_types:
        - steps
      attribute: run
      operator: not_exists
    - cond_type: attribute
      resource_types:
        - steps
      attribute: run
      operator: not_regex_match
      value: "(?s).*\\$\\{\\{\\s*(inputs\\.|github\\.event\\.inputs\\.)"
