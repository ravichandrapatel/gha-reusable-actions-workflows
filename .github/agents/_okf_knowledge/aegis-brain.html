<!DOCTYPE html>
<!--
FILE_NAME: aegis-brain.html
DESCRIPTION: Self-contained OKF bundle graph (aegis-brain). No backend, no CDN, no
             dependencies. Loads graph.json (from kernel/okf.py compile) and
             lint.json (from kernel/okf.py lint) via fetch when served locally,
             or via file picker / drag-and-drop when opened as file://.
             Features: force-directed graph, interactive type legend (click to
             filter), navigator sidebar with search, and a lint panel that
             highlights problem nodes.
VERSION: 0.2.1
AUTHORS: contributors
-->
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>aegis knowledge system</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a23;
      --panel2: #1c202c;
      --text: #d7dae2;
      --muted: #8b90a0;
      --accent: #6aa2ff;
      --border: #262a36;
      --error: #f26d78;
      --warning: #f0c674;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    #topbar {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 10;
      height: 46px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }

    #topbar h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 600;
      white-space: nowrap;
    }

    #topbar h1 span {
      color: var(--accent);
    }

    #legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      overflow: hidden;
    }

    .key {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2px 9px;
      background: var(--panel2);
      transition: opacity .15s;
    }

    .key:hover {
      border-color: #3a4157;
    }

    .key.off {
      opacity: 0.35;
      text-decoration: line-through;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: none;
    }

    #load {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    #load input[type=file] {
      display: none;
    }

    #load label {
      cursor: pointer;
      background: #232838;
      color: var(--text);
      border: 1px solid #313749;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
    }

    #status {
      color: var(--muted);
      font-size: 12px;
    }

    #run-compile {
      cursor: pointer;
      background: #232838;
      color: var(--text);
      border: 1px solid #313749;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
    }

    #run-compile:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    #run-compile:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    #side {
      position: fixed;
      top: 46px;
      left: 0;
      bottom: 0;
      width: 300px;
      z-index: 9;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-right: 1px solid var(--border);
    }

    #searchbox {
      padding: 10px 12px 6px;
    }

    #searchbox input {
      width: 100%;
      background: var(--panel2);
      color: var(--text);
      border: 1px solid #313749;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
    }

    #searchbox input:focus {
      border-color: var(--accent);
    }

    #navlist {
      flex: 1;
      overflow-y: auto;
      padding: 4px 6px 8px;
      min-height: 80px;
    }

    .navgroup summary {
      cursor: pointer;
      list-style: none;
      display: grid;
      grid-template-columns: 12px 10px 1fr;
      gap: 6px;
      align-items: center;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      user-select: none;
    }

    .navgroup summary::-webkit-details-marker {
      display: none;
    }

    .navgroup summary::before {
      content: "▸";
      font-size: 12px;
      grid-column: 1;
      justify-self: center;
      transition: transform .1s;
    }

    .navgroup.zone-group {
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
      padding-bottom: 6px;
    }

    .navgroup.zone-group>summary {
      color: var(--accent);
      font-size: 14px;
    }

    .navgroup.folder-group>summary {
      color: var(--muted);
      font-size: 12px;
      margin-left: 0;
    }

    .navgroup[open] summary::before {
      transform: rotate(90deg);
    }

    .navgroup summary .dot {
      grid-column: 2;
      width: 8px;
      height: 8px;
    }

    .navgroup summary .nav-label {
      grid-column: 3;
      min-width: 0;
    }

    .navitem {
      display: grid;
      grid-template-columns: 12px 10px 1fr auto;
      gap: 6px;
      align-items: center;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 14px;
    }

    .navitem:hover {
      background: var(--panel2);
    }

    .navitem.selected {
      background: #23304d;
    }

    .navitem .dot {
      grid-column: 2;
      width: 8px;
      height: 8px;
    }

    .navitem .arrow {
      grid-column: 2;
      color: var(--muted);
      font-size: 14px;
      justify-self: center;
      font-weight: 700;
    }

    .navitem .nav-label {
      grid-column: 3;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .navitem .mark {
      grid-column: 4;
      font-size: 13px;
    }

    #details {
      border-top: 1px solid var(--border);
      padding: 10px 14px;
      font-size: 12px;
      display: none;
      background: var(--panel2);
    }

    #details .d-title {
      font-weight: 600;
      font-size: 13px;
    }

    #details .d-meta {
      color: var(--muted);
      word-break: break-all;
    }

    #lintpanel {
      border-top: 1px solid var(--border);
      max-height: 34%;
      display: flex;
      flex-direction: column;
    }

    #linthead {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    #linthead .cnt {
      font-weight: 600;
      font-size: 13px;
    }

    #run-lint {
      margin-left: auto;
      cursor: pointer;
      background: #232838;
      color: var(--text);
      border: 1px solid #313749;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
    }

    #run-lint:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    #run-lint:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    .cnt.err {
      color: var(--error);
    }

    .cnt.warn {
      color: var(--warning);
    }

    .cnt.ok {
      color: #a3d977;
    }

    #lintlist {
      overflow-y: auto;
      padding: 0 6px 10px;
    }

    .lintitem {
      display: flex;
      gap: 7px;
      align-items: baseline;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
    }

    .lintitem:hover {
      background: var(--panel2);
    }

    .lintitem .sev {
      flex: none;
      font-weight: 700;
      font-size: 11px;
    }

    .lintitem .sev.error {
      color: var(--error);
    }

    .lintitem .sev.warning {
      color: var(--warning);
    }

    .lintitem .msg {
      color: var(--muted);
    }

    .lintitem b {
      color: var(--text);
      font-weight: 600;
    }

    #reader {
      position: fixed;
      top: 46px;
      right: 0;
      bottom: 0;
      width: 440px;
      z-index: 9;
      display: none;
      flex-direction: column;
      background: var(--panel);
      border-left: 1px solid var(--border);
    }

    #r-head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px 4px;
      border-bottom: 1px solid var(--border);
    }

    #r-title {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }

    #r-close {
      cursor: pointer;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 15px;
      padding: 2px 6px;
      border-radius: 6px;
    }

    #r-close:hover {
      background: var(--panel2);
      color: var(--text);
    }

    #r-meta {
      padding: 0 14px 10px;
      font-size: 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      word-break: break-all;
    }

    #r-meta .tag {
      display: inline-block;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 8px;
      margin: 2px 3px 0 0;
      font-size: 11px;
    }

    #r-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 24px;
      font-size: 13px;
    }

    #r-body h1 {
      font-size: 15px;
      margin: 16px 0 6px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }

    #r-body h2 {
      font-size: 14px;
      margin: 14px 0 5px;
    }

    #r-body h3,
    #r-body h4 {
      font-size: 13px;
      margin: 12px 0 4px;
    }

    #r-body p {
      margin: 6px 0;
    }

    #r-body ul,
    #r-body ol {
      margin: 6px 0;
      padding-left: 1.5em;
      list-style-position: outside;
    }

    #r-body li {
      margin: 3px 0;
    }

    #r-body li>ul,
    #r-body li>ol {
      margin: 4px 0 2px;
      padding-left: 1.5em;
    }

    #r-body .li-cont {
      display: block;
      margin: 2px 0 0 1em;
    }

    #r-body code {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0 4px;
      font-size: 12px;
    }

    #r-body pre {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      font-size: 12px;
    }

    #r-body pre code {
      background: none;
      border: none;
      padding: 0;
    }

    #r-body table {
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 12px;
    }

    #r-body th,
    #r-body td {
      border: 1px solid var(--border);
      padding: 4px 8px;
      text-align: left;
    }

    #r-body th {
      background: var(--panel2);
    }

    #r-body a {
      color: var(--accent);
      text-decoration: none;
    }

    #r-body a:hover {
      text-decoration: underline;
    }

    #r-body a.dead {
      color: var(--muted);
      border-bottom: 1px dashed var(--muted);
      cursor: help;
    }

    canvas {
      display: block;
    }

    #tip {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      display: none;
      background: var(--panel);
      border: 1px solid #313749;
      border-radius: 8px;
      padding: 8px 12px;
      max-width: 340px;
      font-size: 12px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, .5);
    }

    #tip .t-title {
      font-weight: 600;
      margin-bottom: 2px;
    }

    #tip .t-meta {
      color: var(--muted);
    }

    #tip .t-lint.error {
      color: var(--error);
    }

    #tip .t-lint.warning {
      color: var(--warning);
    }
  </style>
</head>

<body>
  <div id="topbar">
    <h1>aegis knowledge system</h1>
    <div id="legend"></div>
    <div id="load">
      <span id="status">loading…</span>
      <button id="run-compile" type="button"
        title="Regenerate graph.json (when served via kernel/okf.py serve)">Run Compile</button>
      <label for="filepick">Open graph.json / lint.json…</label>
      <input id="filepick" type="file" accept=".json" multiple>
    </div>
  </div>
  <div id="side">
    <div id="searchbox"><input id="search" type="search" placeholder="Search concepts…"></div>
    <div id="navlist"></div>
    <div id="details"></div>
    <div id="lintpanel">
      <div id="linthead">
        <span>Lint</span>
        <span id="lintcounts" class="cnt">not loaded</span>
        <button id="run-lint" type="button"
          title="Run lint on the loaded graph (full vault scan when served via kernel/okf.py serve)">Run
          Lint</button>
      </div>
      <div id="lintlist"></div>
    </div>
  </div>
  <canvas id="c"></canvas>
  <div id="tip"></div>
  <div id="reader">
    <div id="r-head">
      <div id="r-title"></div>
      <button id="r-close" title="Close (Esc)">✕</button>
    </div>
    <div id="r-meta"></div>
    <div id="r-body"></div>
  </div>
  <!-- Data embedded by kernel/okf.py compile and kernel/okf.py lint so
     aegis-brain auto-loads even when opened as file:// (where fetch is blocked). -->
  <script id="graph-data" type="application/json">{
  "nodes": [
    {
      "id": "kernel/profiles/_schema",
      "type": "Profile",
      "title": "Profile schema",
      "description": "One-sentence description of the persona's objective \u2014 template for optional kernel/profiles.",
      "tags": [
        "profile",
        "schema",
        "template"
      ],
      "content": "# Profile schema\n\nTemplate for optional capability profiles under `kernel/profiles/`. Copy this file; replace placeholders. Profiles are **not** a runtime Module/Vendor gate \u2014 domain knowledge loads via OKF lookup.\n\n## 1. Profile objective\n\nDefine the scope, boundaries, and primary goal of this persona. What are they authorized to do?\n\n## 2. Dynamic capabilities (RBAC)\n\n### 2.1 Authorized intents\n\n* Example: `CREATE`, `REVIEW`, `OPERATE`\n* Add intents this role may run\n\n### 2.2 Execution modes\n\n* One or more of: `advisory` | `generate` | `enforce`\n* Note any mode that is strictly PROHIBITED for this role\n\n### 2.3 Required vault / standards (lookup)\n\n* Example paths: `vault/concepts/github-actions.md`, `vault/systems/gha-reusable-actions-workflows.md`\n* Example standard: `standards/gha-spvs-yaml.md`\n* Documented for future Profile use \u2014 kernel does not enforce missing paths today\n\n### 2.4 Enforced standards\n\n* Example: `standards/simplicity-first.md`, `standards/okf-prompt-injection.md`\n* Governance rules that strictly apply to this role's output\n\n## Related\n\n- Control plane: [AGENTS.md](/AGENTS.md)\n- Maintenance: [Maintain aegis-system](/vault/playbooks/maintain-aegis-system.md)\n- Prompt rules: [OKF Prompt Injection](/standards/okf-prompt-injection.md)\n- Extending: [Extending Aegis](/vault/concepts/extending-aegis.md)"
    },
    {
      "id": "standards/gha-commit-subjects",
      "type": "Concept",
      "title": "GHA Commit Subjects",
      "description": "Ticket-prefixed conventional commit subjects required for hooks and SemVer bumps.",
      "tags": [
        "standard",
        "github-actions",
        "commits",
        "semver"
      ],
      "content": "# GHA Commit Subjects\n\nHouse rules for subjects in `gha-reusable-actions-workflows`. Enforced by `policies/scripts/commit_message_lib.sh` (global `commit-msg` hook) and Release Manager SemVer.\n\n## MUST\n\n1. Subject **MUST** start with a ticket: `sctask<number>`, `inc<number>`, or `DCDT-<number>` (case-insensitive). Optional `:` after ticket.\n2. Subject **MUST** use a keyword: `feat`, `fix`, `chore`, `docs`, `refactor`, `perf`, `test`, `style`.\n3. Subject **MUST** match one of the four supported ticket+keyword formats documented in the repo README.\n4. Empty subjects **MUST** fail validation.\n5. A `release` **MUST** include at least one `feat`, `fix`, or `chore` since the last component tag (or release fails).\n\n## SHOULD\n\n1. Dependabot commits **SHOULD** use prefix `DCDT-0000 chore`.\n\n## Exemptions\n\n- Merge commits (`Merge ...`) **MUST** be exempt from validation.\n\n## SemVer mapping\n\n| Keyword | Bump |\n| :--- | :--- |\n| `feat` | Minor |\n| `fix`, `chore` | Patch |\n| `docs`, `refactor`, `perf`, `test`, `style` | None |\n\n## Prompt Card\n\n```text\nCommit subject MUST:\n- ticket prefix: sctaskN | incN | DCDT-N (optional :)\n- keyword: feat|fix|chore|docs|refactor|perf|test|style\n- empty subject fails; Merge commits exempt\n- Dependabot SHOULD: DCDT-0000 chore\nSemVer: feat=minor; fix|chore=patch; docs|refactor|perf|test|style=none\nRelease needs \u22651 feat|fix|chore since last tag\n```\n\n## Related\n\n- Concept: [SemVer from commits](/vault/concepts/semver-from-commits.md)\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)\n- Standard: [Simplicity First](/standards/simplicity-first.md), [OKF Prompt Injection](/standards/okf-prompt-injection.md)"
    },
    {
      "id": "standards/gha-component-layout",
      "type": "Concept",
      "title": "GHA Component Layout",
      "description": "Required directory contract for composite actions and reusable workflows in the monorepo.",
      "tags": [
        "standard",
        "github-actions",
        "layout",
        "monorepo"
      ],
      "content": "# GHA Component Layout\n\n## MUST\n\n1. Composite actions **MUST** live at `actions/{category}/{name}/`.\n2. Each action directory **MUST** contain `action.yml` (or `action.yaml`) and `readme.md`.\n3. Reusable workflows **MUST** live at `workflows/{category}/{name}/`.\n4. Each workflow directory **MUST** contain exactly one `workflow.yml` (or `.yaml`) and `readme.md`.\n5. Release Manager `component_path` **MUST** start with `actions/` or `workflows/`.\n6. Categories in use today: `common`, `security` (actions); `common` (workflows).\n\n## FORBIDDEN\n\n1. Inventing alternate trees outside `actions/` or `workflows/` for publishable components.\n2. Multiple workflow YAML files in one workflow component directory.\n\n## Prompt Card\n\n```text\nLayout MUST:\n- actions/{category}/{name}/ \u2192 action.yml|yaml + readme.md\n- workflows/{category}/{name}/ \u2192 exactly one workflow.yml|yaml + readme.md\n- component_path starts with actions/ or workflows/\n- categories today: actions common|security; workflows common\nFORBIDDEN: trees outside actions|workflows; multi workflow YAML per dir\n```\n\n## Related\n\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)\n- Concept: [GitHub Actions](/vault/concepts/github-actions.md)\n- Playbook: [Author composite action](/vault/playbooks/author-gha-composite-action.md)\n- Standard: [Simplicity First](/standards/simplicity-first.md), [OKF Prompt Injection](/standards/okf-prompt-injection.md)"
    },
    {
      "id": "standards/gha-spvs-yaml",
      "type": "Concept",
      "title": "GHA SPVS YAML",
      "description": "OWASP SPVS Conftest policy catalog for workflow and composite action YAML (MUST pass, no soft-fail).",
      "tags": [
        "standard",
        "github-actions",
        "spvs",
        "conftest",
        "security"
      ],
      "content": "# GHA SPVS YAML\n\nPolicies live under `policies/conftest/github_actions/`. Scan with Conftest namespaces `-n workflow` or `-n composite`. Findings **MUST** fail the scan.\n\n## Permissions (MUST)\n\n| ID | Rule |\n| :--- | :--- |\n| CKV2_SPVS_1 | Every job **MUST** declare `permissions:` |\n| CKV2_SPVS_8 | OIDC cloud login jobs **MUST** have `id-token: write` |\n| CKV2_SPVS_9 | Workflow-level permissions **MUST** be declared; **MUST NOT** grant write on contents/packages/id-token/security-events/deployments at workflow root |\n| CKV2_SPVS_10 | **MUST NOT** use `write-all` |\n| CKV2_SPVS_11 | `contents: write` jobs **MUST** set `environment:` |\n| CKV2_SPVS_15 | **MUST NOT** use `pull_request_target` |\n| CKV2_SPVS_12 | **MUST NOT** use bare `runs-on: self-hosted` |\n| CKV2_GHA_1 | Top-level permissions **MUST NOT** be `write-all` |\n\n## Supply chain and shell (MUST)\n\n| ID | Rule |\n| :--- | :--- |\n| CKV2_SPVS_2 | Bash `run:` **MUST** include `set -euo pipefail` |\n| CKV2_SPVS_3 | **MUST NOT** enable xtrace |\n| CKV2_SPVS_4 | Python invocations **MUST** use `-u` or `PYTHONUNBUFFERED=1` |\n| CKV2_SPVS_5 | Third-party `uses:` **MUST** pin to 40-char SHA, `./`, `docker://`, or approved internal `/actions/` tags |\n| CKV2_SPVS_5B | Local `uses:` **MUST NOT** start with `../` |\n| CKV2_SPVS_6 | `${{ inputs.* }}` **MUST NOT** appear in `run:` strings \u2014 map via `env:` |\n| CKV2_SPVS_13 | **MUST NOT** use curl\\|bash style installers |\n| CKV2_SPVS_7 | **MUST NOT** set static cloud credential env vars |\n| CKV_GHA_1\u20134 | No unsecure commands; no user-controlled context in `run:`; no suspicious curl/nc patterns |\n\n## Policy skips (MUST)\n\nWhen `SPVS_SKIP_POLICY` is set, `SPVS_SKIP_REASON` **MUST** also be set (non-empty) at the same scope. `CKV2_SPVS_5` and `CKV2_SPVS_5B` are paired skips.\n\n## Prompt Card\n\n```text\nSPVS MUST (workflow/composite):\n- every job: permissions: (workflows)\n- bash run: set -euo pipefail; no set -x\n- no ${{ inputs.* }} in run \u2014 map via env\n- uses: 40-char SHA | ./ | docker:// | /actions/ tag; no ../\n- no write-all; no pull_request_target; no bare self-hosted\n- no curl|bash; no AWS_ACCESS_KEY_ID/SECRET/SESSION static env\n- contents:write jobs need environment:\n```\n\n## Related\n\n- Concept: [SPVS lifecycle](/vault/concepts/spvs-lifecycle.md)\n- Standard: [OKF Prompt Injection](/standards/okf-prompt-injection.md)\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)\n- Playbook: [Run local policy tests](/vault/playbooks/run-gha-local-policy-tests.md)"
    },
    {
      "id": "standards/metadata-headers",
      "type": "Concept",
      "title": "Metadata Headers",
      "description": "Required metadata blocks on every new file, function, and class across all languages.",
      "tags": [
        "standard",
        "code-quality",
        "documentation",
        "conventions"
      ],
      "content": "Every new file, function, and class MUST carry a metadata block. This makes code\nself-describing for both humans and agents.\n\n# File header\n\nFields: `file_name`, `description`, `version`, `authors` (snake_case).\n\n```python\n# file_name: okf.py\n# description: Single-file Aegis OKF kernel (lookup, compile, lint, ...).\n# version: 0.1.0\n# authors: contributors\n```\n\n# Function / class header\n\nFields: `intent`, `input`, `output`, `role`, `side_effects` (snake_case).\n\n```python\ndef slugify(text: str) -> str:\n    \"\"\"\n    intent: Turn a free-text query into a safe filename slug.\n    input: text \u2014 arbitrary user query string.\n    output: lowercase kebab-case slug.\n    role: pure helper.\n    side_effects: none.\n    \"\"\"\n```\n\n## Prompt Card\n\n```text\nMetadata MUST on new files: file_name, description, version, authors.\nOn new functions/classes: intent, input, output, role, side_effects.\nSnake_case field names; match existing kernel header style.\n```\n\n# Related\n\n- [Simplicity First](/standards/simplicity-first.md)"
    },
    {
      "id": "standards/okf-prompt-injection",
      "type": "Concept",
      "title": "OKF Prompt Injection",
      "description": "Binding rule \u2014 anytime Aegis runs, inject a dynamic Prompt Pack from live lookup; vault-first catalogs with live refresh when stale; grader reads only for explain/fix \u2014 not a static path ban-list.",
      "tags": [
        "standard",
        "okf",
        "prompting",
        "tokens",
        "aegis",
        "retrieval",
        "cache"
      ],
      "content": "# OKF Prompt Injection (Rule #2)\n\n**Rule #2.** Curated OKF stays in the vault. Generation and Q&A context get a **dynamic Prompt Pack**: slim `## Prompt Card` text from **this turn\u2019s** `okf.py lookup` / `okf.py card` \u2014 not a full-brain dump and not a static \u201cnever open these paths\u201d encyclopedia in AGENTS.md.\n\n**Scope:** Anytime Aegis is used (questions, review, authoring) \u2014 not only Path A artifact generation.\n\nDomain graders differ by stack. **What is in-bounds for a turn is defined by the live lookup hit-set** (and, for benches, by task placeholders such as `GATE_ANSWER_KEY_GLOBS`).\n\n## Retrieval ladder (global)\n\n| Priority | Lane | How | Use for | Must not use for |\n| :---: | :--- | :--- | :--- | :--- |\n| 1 | **OKF knowledge cache** | `okf.py lookup --card` (+ \u22641 follow-up `lookup`/`card`) | Standards, playbooks, concepts, catalogs, pins/versions in the vault | Random vault Grep; paste `graph.json` / full docs |\n| 2 | **Pointers from cards** | Read only paths the **current cards** name | One deep dive the pack pointed to | Opening every related file |\n| 3 | **Task corpus** | Glob \u2192 Grep \u2192 Read (or Explore subagent) | Product/code/config being changed or inspected | Discovering org compliance that should be on cards |\n| 4 | **Grader / answer key** | See [Grader access](#grader-access-daily-work) | Explain failure (what/why/where); fix from gate output | Authoring-time peek to invent compliance |\n\nLane 1 **MUST** run before vault Grep or authoring. Corpus Grep (lane 3) is allowed after lane 1; it is not a substitute for lane 1.\n\n## Catalog / pin freshness (vault + live)\n\nPins, version catalogs, and similar reference data use **both** sources, ordered by freshness need:\n\n1. **Vault first (default):** human-maintained Prompt Cards; keep warm with `okf.py compile` (`index.json` / `prompt_cards.json`; process also mtime-caches them).\n2. **Live fetch when stale or missing:** network/`gh`/upstream only if the card is absent, marked stale, or the user requires verification against current upstream.\n3. **Write-back (SHOULD):** durable discoveries belong back in the vault via the maintain playbook \u2014 do not rediscover every run.\n\nAgents **MUST NOT** default to live rediscovery when a current card already supplies the catalog.\n\n## Grader access (daily work)\n\n| Mode | Policy / Rego / CI rule sources |\n| :--- | :--- |\n| **Authoring / writing** | Cards (+ failure text if remediating). **MUST NOT** mine the grader to invent compliance. |\n| **Asked what failed / why / where** | **MAY** open the relevant grader source to explain and locate the rule. Prefer starting from failure output, then open the cited file/rule. |\n| **A/B bench OKF arm** | Follow the bench prompt: forbidden globs are **task-specific** (`GATE_ANSWER_KEY_GLOBS`), not this standard\u2019s static list. |\n\n## MUST\n\n1. Anytime Aegis is used, run `okf.py lookup --card` (or `lookup` then `card`) with **task-specific** keywords before vault Grep or generation.\n2. Assemble a **Prompt Pack** from returned `## Prompt Card` sections only.\n3. Each card **MUST** target **\u2264150 tokens** (~600 characters). Prefer shorter.\n4. Total Prompt Pack for one turn **SHOULD** stay **\u2264400 tokens** unless the user expands scope.\n5. Encyclopedic bodies **MUST** stay in the vault \u2014 **MUST NOT** be copied wholesale into the generation prompt.\n6. Binding rules **MUST** expose a `## Prompt Card` so lookup can surface them dynamically.\n7. Missing pin/version/constraint in the pack \u2192 **one** follow-up `lookup`/`card`, then act (or live-refresh per freshness rules above).\n\n## SHOULD\n\n1. `okf.py card <path>\u2026` when paths are already known from lookup.\n2. Prefer **one-shot validation pass** (e.g. Conftest) when the Prompt Pack already encodes binding rules \u2014 avoid generate \u2192 fail \u2192 remediate loops when the first pack is sufficient.\n3. Keep domain catalogs/pins **on cards** so vault-first stays viable. Maintain a **pin cache** (tag \u2192 40-char SHA) for common `uses:`; attach it when remediating pin findings (e.g. CKV2_S\n\n\u2026"
    },
    {
      "id": "standards/simplicity-first",
      "type": "Concept",
      "title": "Simplicity First (Rule #1)",
      "description": "The Laziness Ladder \u2014 always choose the simplest, shortest, minimal solution that works. Overrides complexity in design, code, and vault structure.",
      "tags": [
        "standard",
        "simplicity",
        "laziness-ladder",
        "principles"
      ],
      "content": "**Rule #1.** Apply the Laziness Ladder as the primary lens for every decision in\nthis vault and in code: the simplest, shortest, most minimal solution that works.\n\n# Laziness Ladder\n\nWhen multiple approaches solve the problem, pick the lowest rung that still works:\n\n| Rung | Approach | Example |\n|------|----------|---------|\n| 1 | Do nothing new | Reuse an existing concept, playbook, or reference |\n| 2 | Edit one file | Fix a link, add one paragraph, patch one script |\n| 3 | Add one small file | One new concept \u2014 not a new directory tree |\n| 4 | Add tooling | Only when manual steps repeat and hurt |\n| 5 | Add abstraction | Last resort \u2014 never start here |\n\n# In the vault\n\n- One concept per file; cross-link instead of duplicating prose.\n- Prefer `index.md` progressive disclosure over bulk-reading the tree.\n- Scripts are stdlib-only unless a dependency is unavoidable.\n- New types, directories, or tooling require justification against this rule.\n\n# In code\n\n- Smallest diff that fixes the root cause \u2014 no drive-by refactors.\n- No helpers for one-liners; no frameworks where a script suffices.\n- Match existing conventions before inventing new ones.\n\n## Prompt Card\n\n```text\nRule #1 Laziness Ladder: simplest shortest minimal solution that works.\nPrefer reuse \u2192 one-file edit \u2192 one small file \u2192 tooling \u2192 abstraction (last).\nSmallest diff; stdlib scripts; no new dirs/types without justification.\n```\n\n# Related\n\n- All other house standards: [Standards index](index.md)\n- Metadata discipline: [Metadata Headers](metadata-headers.md)\n- Prompt discipline: [OKF Prompt Injection](okf-prompt-injection.md)"
    },
    {
      "id": "vault/concepts/component-tagging",
      "type": "Concept",
      "title": "Component Tagging",
      "description": "safe_name derivation and versioned vs stable tag conventions for GHA components.",
      "tags": [
        "github-actions",
        "tagging",
        "release",
        "concepts"
      ],
      "content": "# Component Tagging\n\n| Item | Rule |\n| :--- | :--- |\n| `safe_name` | Basename of `component_path` (Release Manager rejects duplicate basenames across categories) |\n| Versioned tag | `{safe_name}-{X.Y.Z}` e.g. `janitor-bot-1.2.3` |\n| Stable tag | `{safe_name}-v1` e.g. `janitor-bot-v1` |\n| Promote | Delete remote stable tag then recreate at target SHA (no force-push) |\n| Rollback previous | Sorted versioned tags; previous index of target `{safe_name}-{version}` |\n| Workflow sync | On release, copy `workflows/.../workflow.yml` to `.github/workflows/{name}.yml` then tag |\n\nConsumers typically reference `@v1` (stable) or a versioned tag / commit SHA.\n\n## Prompt Card\n\n```text\nTags: versioned {safe_name}-{X.Y.Z}; stable {safe_name}-v1.\nsafe_name = basename(component_path); duplicate basenames rejected.\nPromote = delete+recreate stable tag at target SHA (never force-push).\nWorkflow release also syncs .github/workflows/{name}.yml before tagging.\n```\n\n## Related\n\n- Concept: [Release Manager modes](/vault/concepts/release-manager-modes.md), [SemVer from commits](/vault/concepts/semver-from-commits.md)\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)"
    },
    {
      "id": "vault/concepts/extending-aegis",
      "type": "Concept",
      "title": "Extending Aegis",
      "description": "How to grow this empty framework with your own standards and vault knowledge.",
      "tags": [
        "aegis-system",
        "getting-started",
        "framework"
      ],
      "content": "# Extending Aegis\n\nThis package is an **empty control plane**: `AGENTS.md` + `_okf_knowledge/`. Zip it, drop the folder into an IDE agents directory, then add your knowledge.\n\n## Add durable knowledge\n\n1. Drop raw material in [`_inbox/`](/_inbox/).\n2. Follow [Maintain aegis-system](/vault/playbooks/maintain-aegis-system.md).\n3. From the package directory:\n\n```bash\npython3 _okf_knowledge/kernel/okf.py compile\npython3 _okf_knowledge/kernel/okf.py lint\n```\n\n## Where things go\n\n| Content | Directory (under `_okf_knowledge/`) | `type` |\n| :--- | :--- | :--- |\n| House rule | `standards/` | `Concept` + tag `standard` |\n| Evergreen fact / pattern | `vault/concepts/` | `Concept` |\n| Procedure | `vault/playbooks/` | `Playbook` |\n| Running system | `vault/systems/` | `System` |\n| Post-mortem | `vault/incidents/` | `Incident` |\n| Cached upstream docs | `vault/references/` | `Reference` |\n\n## Frontmatter (required)\n\n```yaml\n---\ntype: Concept\ntitle: Human-readable name\ndescription: One-line summary for indexes and okf_lookup\ntags: [kebab-case, topic]\ntimestamp: 2026-07-13T00:00:00Z\nstatus: active\n---\n```\n\n## Prompt Card\n\n```text\nNew knowledge MUST: pick type/dir from the table (standards/, vault/*),\nadd required frontmatter (type,title,description,tags,timestamp,status),\nthen run okf.py compile + okf.py lint from the package dir.\nFollow vault/playbooks/maintain-aegis-system.md end-to-end.\n```\n\n## Related\n\n- Control plane: [AGENTS.md](/AGENTS.md)\n- Maintenance: [Maintain aegis-system](/vault/playbooks/maintain-aegis-system.md)\n- Law: [Simplicity First](/standards/simplicity-first.md)\n- Profile template: [Profile schema](/kernel/profiles/_schema.md)\n- Architecture ADR (package root, outside vault): see `ADR.md` next to `README.md`"
    },
    {
      "id": "vault/concepts/gha-yaml-anchors",
      "type": "Concept",
      "title": "GHA YAML Anchors",
      "description": "Reuse env, steps, or jobs inside one GitHub Actions workflow with YAML anchors (&) and aliases (*) \u2014 no merge keys.",
      "tags": [
        "github-actions",
        "yaml",
        "anchors",
        "workflow",
        "reuse"
      ],
      "content": "# GHA YAML Anchors\n\nGitHub Actions supports YAML **anchors** (`&`) and **aliases** (`*`) to copy configuration within a **single** workflow file. Enabled for all repositories (Sep 2025).\n\n## Syntax\n\n| Mark | Role |\n| :--- | :--- |\n| `&name` | Define an anchor on first use |\n| `*name` | Insert an exact copy of that node |\n\n```yaml\njobs:\n  build:\n    env: &shared_env\n      NODE_ENV: production\n      CI: true\n    steps: &checkout_and_setup\n      - uses: actions/checkout@v4\n      - uses: actions/setup-node@v4\n        with:\n          node-version: '20'\n      - run: npm ci\n\n  test:\n    env: *shared_env\n    runs-on: ubuntu-latest\n    steps: *checkout_and_setup\n```\n\nReuse an entire job:\n\n```yaml\njobs:\n  unit: &test_job\n    runs-on: ubuntu-latest\n    timeout-minutes: 30\n    steps:\n      - uses: actions/checkout@v4\n      - run: npm test\n\n  integration: *test_job\n```\n\n## Constraints (MUST know)\n\n| Rule | Detail |\n| :--- | :--- |\n| Same file only | Anchors do **not** cross workflow files |\n| Exact copy only | Alias is a full duplicate of the anchored node |\n| No merge keys | `<<:` is **not** supported \u2014 no base + override |\n\n```yaml\n# FORBIDDEN on GitHub Actions \u2014 merge keys do not work\njob2:\n  <<: *base_job\n  env:\n    EXTRA: true\n```\n\n## When to use what\n\n| Need | Use |\n| :--- | :--- |\n| Same env / steps / job repeated in one file | YAML anchors |\n| Parameterized or cross-repo shared logic | Reusable workflow (`workflow_call`) or composite action |\n| Base job + small per-job diffs | Keep duplication, or extract shared steps into a composite action |\n\nPrefer the simplest rung: if duplication is tiny, skip anchors ([Simplicity First](/standards/simplicity-first.md)).\n\n## Prompt Card\n\n```text\nYAML anchors (&) / aliases (*) reuse nodes within ONE workflow file only.\nAlias = exact copy; merge keys (<<:) FORBIDDEN on GitHub Actions.\nCross-file or parameterized reuse -> reusable workflow / composite action.\nTiny duplication? Skip anchors (Simplicity First).\n```\n\n## Related\n\n- Concept: [GitHub Actions](/vault/concepts/github-actions.md)\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)\n- Standard: [GHA component layout](/standards/gha-component-layout.md)\n\n# Citations\n\n1. [Reusing workflow configurations \u2014 YAML anchors and aliases](https://docs.github.com/en/actions/reference/workflows-and-actions/reusing-workflow-configurations#yaml-anchors-and-aliases)\n2. [Changelog: Actions YAML anchors (2025-09-18)](https://github.blog/changelog/2025-09-18-actions-yaml-anchors-and-non-public-workflow-templates/)"
    },
    {
      "id": "vault/concepts/github-actions",
      "type": "Concept",
      "title": "GitHub Actions Domain",
      "description": "Domain routing for composite actions, reusable workflows, Release Manager, and SPVS Conftest in gha-reusable-actions-workflows.",
      "tags": [
        "github-actions",
        "spvs",
        "domain"
      ],
      "content": "# GitHub Actions Domain\n\n**Triggers:** \"github action\", \"reusable workflow\", \"release manager\", \"SPVS\", \"action.yml\", \"workflow_call\", \"promote tag\", \"conftest gha\", \"yaml anchor\", \"workflow alias\"\n\n**Minimum evidence:** component path under `actions/` or `workflows/` (or YAML in `_inbox/`) plus intent (author, review, release, promote, rollback, policy). Halt BLOCKED if unmet.\n\nRoute via Related \u2014 do not restate layout, SPVS rules, SemVer, or release semantics here.\n\n## Prompt Card\n\n```text\nGHA domain: route to layout + gha-spvs-yaml + release-manager-modes cards.\nComponents under actions/{cat}/{name}/ or workflows/{cat}/{name}/ only.\nInject slim cards \u2014 never full SPVS/layout docs.\n```\n\n## Related\n\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)\n- Standards: [GHA component layout](/standards/gha-component-layout.md), [GHA SPVS YAML](/standards/gha-spvs-yaml.md), [OKF Prompt Injection](/standards/okf-prompt-injection.md)\n- Concepts: [SPVS Lifecycle](/vault/concepts/spvs-lifecycle.md), [Release Manager modes](/vault/concepts/release-manager-modes.md), [SemVer from commits](/vault/concepts/semver-from-commits.md), [GHA YAML Anchors](/vault/concepts/gha-yaml-anchors.md)\n- Playbooks: [Author composite action](/vault/playbooks/author-gha-composite-action.md), [Release component](/vault/playbooks/release-gha-component.md)"
    },
    {
      "id": "vault/concepts/release-manager-modes",
      "type": "Concept",
      "title": "Release Manager Modes",
      "description": "release, promote, and rollback semantics for the gha-reusable-actions-workflows Release Manager.",
      "tags": [
        "github-actions",
        "release-manager",
        "concepts"
      ],
      "content": "# Release Manager Modes\n\nOrchestrator: `.github/workflows/release-manager.yml` (`workflow_dispatch`).\n\n## Inputs\n\n| Input | Required | Notes |\n| :--- | :--- | :--- |\n| `component_path` | Yes | e.g. `actions/common/janitor-bot` |\n| `mode` | Yes | `release` \\| `promote` \\| `rollback` |\n| `version` | No | Release: auto-derived if empty. Promote/rollback: defaults to latest versioned tag if empty. |\n\n## Stages\n\n1. **Validate** \u2014 path/type, SemVer derivation (release), tag checks\n2. **Security** \u2014 Conftest, Actionlint, Bandit, Shellcheck (**release only**)\n3. **Execute** \u2014 tag, sync workflow file, promote/rollback stable tag\n\nEnvironments: `sandbox` (release), `production` (promote/rollback).\n\n## Mode behavior\n\n| Mode | Security | Result |\n| :--- | :--- | :--- |\n| `release` | Full | Create `{safe_name}-{X.Y.Z}`; sync workflow to `.github/workflows/{name}.yml` when applicable |\n| `promote` | Skipped | Point `{safe_name}-v1` at chosen versioned tag (delete+recreate, no force-push) |\n| `rollback` | Skipped | Move `v1` to previous versioned tag; restore prior workflow file if needed |\n\n## Prompt Card\n\n```text\nRelease Manager (workflow_dispatch): inputs component_path, mode, version(optional).\nrelease = versioned tag + FULL security stage (Conftest/Actionlint/Bandit/Shellcheck).\npromote = move {safe_name}-v1 to chosen tag (security skipped, env production).\nrollback = v1 to previous versioned tag; restore synced workflow file if needed.\n```\n\n## Related\n\n- Concept: [SemVer from commits](/vault/concepts/semver-from-commits.md), [Component tagging](/vault/concepts/component-tagging.md)\n- Playbook: [Release component](/vault/playbooks/release-gha-component.md)\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)"
    },
    {
      "id": "vault/concepts/semver-from-commits",
      "type": "Concept",
      "title": "SemVer from Commits",
      "description": "How ticket conventional commits map to SemVer bumps for component tags.",
      "tags": [
        "github-actions",
        "semver",
        "commits",
        "concepts"
      ],
      "content": "# SemVer from Commits\n\nImplemented by `actions/common/semver` using `policies/scripts/commit_message_lib.sh`.\n\n## Rules\n\n1. Lookup latest tag `{safe_name}-[0-9]*`; version is the suffix.\n2. No prior tag: treat current as `0.0.0` then next is **`1.0.0`**.\n3. Scan commits since last tag; classify by keyword.\n4. Any `feat` -> minor bump; else `fix`/`chore` -> patch; else docs/refactor/perf/test/style -> no bump.\n5. Release fails if no bump-capable commits since last tag.\n6. Explicit `version` input on Release Manager bypasses auto-calculation.\n\n## Prompt Card\n\n```text\nSemVer from commits since last {safe_name}-* tag:\nfeat -> minor; fix/chore -> patch; docs/refactor/perf/test/style -> no bump.\nNo prior tag -> first release is 1.0.0. No bump-capable commits -> release FAILS.\nExplicit version input bypasses auto-calculation.\n```\n\n## Related\n\n- Standard: [GHA commit subjects](/standards/gha-commit-subjects.md)\n- Concept: [Release Manager modes](/vault/concepts/release-manager-modes.md), [Component tagging](/vault/concepts/component-tagging.md)\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)"
    },
    {
      "id": "vault/concepts/spvs-lifecycle",
      "type": "Concept",
      "title": "SPVS Lifecycle",
      "description": "OWASP SPVS Plan/Integrate/Release/Operate stages mapped onto this monorepo \u2014 plus Dependency-Check runner constraints.",
      "tags": [
        "github-actions",
        "spvs",
        "lifecycle",
        "owasp",
        "concepts"
      ],
      "content": "# SPVS Lifecycle\n\n| Stage | This repository |\n| :--- | :--- |\n| Plan / Develop | Commit-msg hook; ticket conventional commits; SemVer derivation |\n| Integrate | Pre-commit Conftest, Actionlint, Bandit, Shellcheck (change-scoped) |\n| Release | Release Manager security job; versioned tags; workflow sync |\n| Operate | Promote / rollback; stable `v1` tags; branch protection / App bypass |\n\nBranch protection, signed commits, CODEOWNERS are GitHub settings \u2014 not workflow YAML.\n\n## Dependency-Check\n\nWhen scanning with OWASP Dependency-Check: require Podman/ARC-compatible runners; no Docker-only assumptions. YAML policy itself stays in [GHA SPVS YAML](/standards/gha-spvs-yaml.md).\n\n## Prompt Card\n\n```text\nSPVS stages: Plan=commit-msg+SemVer; Integrate=pre-commit Conftest/Actionlint/Bandit/Shellcheck;\nRelease=RM security+tags; Operate=promote/rollback v1.\nBranch protection/CODEOWNERS = GitHub settings, not YAML.\nDependency-Check: Podman/ARC runners only \u2014 no Docker-only assumptions.\n```\n\n## Related\n\n- Standard: [GHA SPVS YAML](/standards/gha-spvs-yaml.md)\n- Concept: [GitHub Actions Domain](/vault/concepts/github-actions.md)\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)"
    },
    {
      "id": "vault/playbooks/author-gha-composite-action",
      "type": "Playbook",
      "title": "Author GHA Composite Action",
      "description": "Scaffold and validate a new composite action under actions/{category}/{name}/.",
      "tags": [
        "github-actions",
        "playbook",
        "authoring"
      ],
      "content": "# Trigger\n\nYou need a new composite GitHub Action in the monorepo.\n\n# Preconditions\n\n- Layout standard understood: [GHA component layout](/standards/gha-component-layout.md).\n- Local SPVS tooling available (or use Release Manager later).\n\n# Steps\n\n1. Create `actions/{category}/{name}/` with `action.yml` and `readme.md`.\n2. When an agent authors the action, assemble a **Prompt Pack** with `python3 _okf_knowledge/kernel/okf.py card` on layout + SPVS (+ pins) \u2014 see [OKF Prompt Injection](/standards/okf-prompt-injection.md). **MUST NOT** paste full standards.\n3. Follow SPVS shell/env patterns: `set -euo pipefail`, map inputs via `env`, pin third-party `uses:` to SHA.\n4. Keep `readme.md` short (inputs/outputs + one usage example).\n5. Run Conftest composite scan:\n\n```bash\nconftest test --parser yaml -n composite \\\n  -p policies/conftest/github_actions/composite \\\n  -p policies/conftest/github_actions/lib \\\n  actions/{category}/{name}/action.yml\n```\n\n6. If Conftest fails on `CKV2_SPVS_5`, remediate with a **pin cache** (tag\u2192SHA) rather than asking the agent to discover SHAs from scratch.\n7. Run Bandit/Shellcheck on helpers if present.\n8. Open PR with a ticket-prefixed conventional subject.\n\n# Verification\n\n- [ ] Directory matches layout standard\n- [ ] Conftest composite scan passes\n- [ ] `readme.md` documents inputs/outputs\n- [ ] Agent prompt used a minimal card (not full SPVS dump)\n\n## Prompt Card\n\n```text\nNew composite action: actions/{category}/{name}/ with action.yml + short readme.md.\nShell: set -euo pipefail; map inputs via env (no ${{ inputs.* }} in run);\npin third-party uses: to 40-char SHA (use pin cache on CKV2_SPVS_5).\nGate: conftest test --parser yaml -n composite -p policies/conftest/github_actions/{composite,lib}.\nPR subject: ticket-prefixed conventional commit.\n```\n\n# Related\n\n- Standard: [OKF Prompt Injection](/standards/okf-prompt-injection.md)\n- Standard: [GHA SPVS YAML](/standards/gha-spvs-yaml.md), [GHA component layout](/standards/gha-component-layout.md)\n- Concept: [GitHub Actions](/vault/concepts/github-actions.md)\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)"
    },
    {
      "id": "vault/playbooks/bootstrap-spvs-dev-environment",
      "type": "Playbook",
      "title": "Bootstrap SPVS Dev Environment",
      "description": "Install local hooks and scanners for gha-reusable-actions-workflows development.",
      "tags": [
        "github-actions",
        "spvs",
        "playbook",
        "bootstrap"
      ],
      "content": "# Trigger\n\nYou need local commit-msg, pre-commit, Actionlint, Conftest, Bandit, and Shellcheck for this monorepo.\n\n# Preconditions\n\n- Clone at `/home/ghost/workspace-latest/gha-reusable-actions-workflows` (or equivalent).\n- Network access to install pinned tools.\n\n# Steps\n\n1. `cd` to the monorepo root.\n2. Run `bash policies/scripts/install_hooks.sh`.\n3. Confirm `git config --global core.hooksPath` points at `~/.git-templates/hooks`.\n4. Install repo pre-commit: `pre-commit install` (if not done by the installer).\n5. Smoke: `pre-commit run --all-files` on a clean tree (or a small intentional change).\n\n# Verification\n\n- [ ] `commit-msg` rejects a subject without a ticket prefix\n- [ ] `bash policies/tests/run_tests.sh` exits 0\n- [ ] Actionlint/Conftest binaries resolve on PATH\n\n## Prompt Card\n\n```text\nBootstrap: bash policies/scripts/install_hooks.sh from monorepo root;\npre-commit install; smoke with pre-commit run --all-files.\nVerify: commit-msg rejects non-ticket subjects; policies/tests/run_tests.sh exits 0.\n```\n\n# Related\n\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)\n- Standard: [GHA commit subjects](/standards/gha-commit-subjects.md)"
    },
    {
      "id": "vault/playbooks/maintain-aegis-system",
      "type": "Playbook",
      "title": "Maintain aegis-system",
      "description": "How to add or update concepts, playbooks, references, scripts, and skills in the aegis-system OKF vault \u2014 with post-change verification.",
      "tags": [
        "aegis-system",
        "ingest",
        "maintenance",
        "okf",
        "procedure"
      ],
      "content": "# Trigger\n\nYou need to add or change durable knowledge in aegis-system: a concept, house standard,\nplaybook, reference, vault script, agent bridge, or Cursor skill.\n\n# Preconditions\n\n- [AGENTS.md](/AGENTS.md) \u00a71.2 binds all brain mutations to this playbook \u2014 follow it end-to-end.\n- Read [AGENTS.md](/AGENTS.md) \u00a71.3 for the OKF frontmatter schema before creating files.\n- Raw source material (if any) is in [`_inbox/`](/_inbox/) and has not been edited.\n- You know which `type` the content is (see decision table below).\n\n# What to create \u2014 decision table\n\n| You are documenting\u2026 | `type` | Directory | Also update |\n|----------------------|--------|-----------|-------------|\n| Evergreen knowledge, pattern, tool overview | `Concept` | `vault/` (by domain) | `vault/index.md` |\n| House rule (MUST/SHOULD) | `Concept` + tag `standard` | `standards/` | [standards/index.md](/standards/index.md) |\n| Executable agent procedure | `Playbook` | `vault/playbooks/` | [playbooks/index.md](/vault/playbooks/index.md) |\n| Cached upstream docs | `Reference` | `vault/references/` | Run `kernel/okf.py optimize` |\n| Running system in workspace | `System` | `vault/systems/` | [systems/index.md](/vault/systems/index.md) |\n| Post-mortem | `Incident` | `vault/incidents/` | Link to affected systems/playbooks |\n| Domain routing / tool overview | `Concept` | `vault/concepts/` | [vault/index.md](/vault/index.md) |\n| Vault tooling (lint, compile, scrape) | Python script | `kernel/` | This playbook \u00a7 Scripts |\n| Control-plane schema / persona | Markdown | `AGENTS.md` (package root, next to `_okf_knowledge/`) | [_okf_knowledge/index.md](/index.md) |\n\n# Add or update a concept\n\n## 1. Choose path and filename\n\n- One concept per file; kebab-case filename matching the topic.\n- House standards go in `standards/` with `tags: [standard, \u2026]`.\n- Domain concepts go in `vault/`.\n\n## 2. Frontmatter (required)\n\n```yaml\n---\ntype: Concept\ntitle: Human-readable name\ndescription: One-line summary for indexes and okf_lookup.\ntags: [kebab-case, topic]\ntimestamp: 2026-07-13T00:00:00Z\nstatus: active\n---\n```\n\n## 3. Body\n\n- Prefer headings, tables, lists, and fenced code over long prose.\n- Standards: normative **MUST** / **SHOULD** / **FORBIDDEN** language.\n- Binding standards **MUST** include a non-empty `## Prompt Card` section (\u2264150 tokens / ~600 chars) \u2014 enforced by `okf.py lint` (`DBG-308` / `DBG-309`). See [OKF Prompt Injection](/standards/okf-prompt-injection.md).\n- Other agent-facing concepts **SHOULD** include a `## Prompt Card` for slim injection.\n- External claims: `# Citations` with numbered `[1] [title](url)` entries.\n- Link to related concepts with bundle-absolute paths.\n\n## 4. Cross-links (both directions)\n\n- New concept MUST link to at least one existing related concept.\n- Update those existing files to link back.\n- Update every affected `index.md` on the path from root to the file.\n\n# Add or update a playbook\n\n## Required sections\n\n```markdown\n# Trigger\n# Preconditions\n# Steps\n# Verification\n```\n\n- Add a one-line entry to [playbooks/index.md](/vault/playbooks/index.md).\n\n# Add or update a script\n\nThe kernel is a single script, `kernel/okf.py`, with one subcommand per operation; it is **not** an OKF concept.\n\n| Subcommand | Role |\n|--------|------|\n| `okf.py compile` | Regenerate `graph.json`, `index.json`, `prompt_cards.json`; embed graph in `aegis-brain.html` |\n| `okf.py lint` | Conformance + broken links + orphans + **standards Prompt Card gate** \u2192 `lint.json` |\n| `okf.py card` | Extract `## Prompt Card` sections for slim agent injection |\n| `okf.py lookup` | Search via `index.json` (fallback: live vault); list hits or budgeted `--card` |\n| `okf.py enrich` | LLM gap-fill for retrieval fields (description, tags, `## Prompt Card`); dry-run by default, `--write` to apply |\n| `okf.py scrape` | JIT upstream fetch \u2192 `vault/` |\n| `okf.py optimize` | Normalize references, rebuild vault indexes, run compiler |\n| `okf.py serve` | Local server + `POST /api/lint` / `POST /api/comp\n\n\u2026"
    },
    {
      "id": "vault/playbooks/release-gha-component",
      "type": "Playbook",
      "title": "Release GHA Component",
      "description": "Run Release Manager mode release/promote/rollback for a monorepo component.",
      "tags": [
        "github-actions",
        "playbook",
        "release"
      ],
      "content": "# Trigger\n\nYou need to release, promote, or roll back a composite action or reusable workflow.\n\n# Preconditions\n\n- Component path valid under `actions/` or `workflows/`.\n- Secrets `RELEASE_APP_ID` and `RELEASE_APP_PRIVATE_KEY` configured.\n- Understand [Release Manager modes](/vault/concepts/release-manager-modes.md).\n\n# Steps\n\n1. Ensure commits since last tag include `feat`/`fix`/`chore` if auto-bumping ([SemVer from commits](/vault/concepts/semver-from-commits.md)).\n2. Open Actions -> **Release Manager** (`workflow_dispatch`).\n3. Set `component_path` (e.g. `actions/common/janitor-bot`).\n4. Set `mode`:\n   - `release` \u2014 sandbox versioned tag + security stage\n   - `promote` \u2014 move `{safe_name}-v1` to chosen version\n   - `rollback` \u2014 previous versioned tag (+ restore workflow file if needed)\n5. Optionally set `version` to pin SemVer / target.\n6. Wait for Validate -> Security (release only) -> Execute.\n\n# Verification\n\n- [ ] Versioned or stable tag exists remotely as expected ([Component tagging](/vault/concepts/component-tagging.md))\n- [ ] For workflow releases, `.github/workflows/{name}.yml` matches source\n- [ ] Consumers can reference `@v1` after promote\n\n## Prompt Card\n\n```text\nRelease: Actions -> Release Manager (workflow_dispatch); set component_path + mode\n(release|promote|rollback), optional version. Auto-bump needs feat/fix/chore commits\nsince last tag. Verify remote tag ({safe_name}-{X.Y.Z} or -v1) and synced workflow file.\n```\n\n# Related\n\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)\n- Concept: [Release Manager modes](/vault/concepts/release-manager-modes.md)\n- Standard: [GHA commit subjects](/standards/gha-commit-subjects.md)"
    },
    {
      "id": "vault/playbooks/run-gha-local-policy-tests",
      "type": "Playbook",
      "title": "Run GHA Local Policy Tests",
      "description": "Execute Conftest verify/scan and policy unit tests for the monorepo.",
      "tags": [
        "github-actions",
        "playbook",
        "conftest",
        "testing"
      ],
      "content": "# Trigger\n\nYou changed Rego policies, action/workflow YAML, or need a full local SPVS gate.\n\n# Preconditions\n\n- Conftest installed (see [Bootstrap SPVS Dev Environment](/vault/playbooks/bootstrap-spvs-dev-environment.md)).\n- Working tree at monorepo root.\n\n# Steps\n\n1. Full suite: `bash policies/tests/run_tests.sh`\n2. Single workflow:\n\n```bash\nconftest test --parser yaml -n workflow \\\n  -p policies/conftest/github_actions/workflow \\\n  -p policies/conftest/github_actions/lib \\\n  path/to/workflow.yml\n```\n\n3. Single composite action:\n\n```bash\nconftest test --parser yaml -n composite \\\n  -p policies/conftest/github_actions/composite \\\n  -p policies/conftest/github_actions/lib \\\n  path/to/action.yml\n```\n\n4. If `policies/conftest/` changed, run `pre-commit run --all-files` (full rescan path).\n\n# Verification\n\n- [ ] `run_tests.sh` exits 0\n- [ ] No open SPVS findings without paired `SPVS_SKIP_POLICY` + `SPVS_SKIP_REASON`\n\n## Prompt Card\n\n```text\nFull gate: bash policies/tests/run_tests.sh (exit 0 required).\nSingle file: conftest test --parser yaml -n workflow|composite\n  -p policies/conftest/github_actions/{workflow|composite} -p .../lib <file>.\nRego changed? pre-commit run --all-files. Skips need SPVS_SKIP_POLICY + SPVS_SKIP_REASON.\n```\n\n# Related\n\n- Standard: [GHA SPVS YAML](/standards/gha-spvs-yaml.md)\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)"
    },

      "content": "# gha-reusable-actions-workflows README\n\nLocal source of truth (clone):\n\n`/home/ghost/workspace-latest/gha-reusable-actions-workflows/README.md`\n\nCovers: Release Manager lifecycle, commit format, repository structure, full SPVS Conftest catalog, scan commands, prerequisites.\n\n## Gaps in this clone\n\n- `docs/` handbook chapters linked from README are **missing**\n- `okf_bundle/` is **missing**\n\nRe-fetch from remote before citing those paths as verified.\n\n## Prompt Card\n\n```text\nSource of truth: gha-reusable-actions-workflows/README.md (local clone).\nCovers Release Manager lifecycle, commit format, SPVS catalog, scan commands.\nClone gaps: docs/ chapters and okf_bundle/ missing \u2014 re-fetch before citing.\n```\n\n## Related\n\n- System: [gha-reusable-actions-workflows](/vault/systems/gha-reusable-actions-workflows.md)\n- Standard: [GHA SPVS YAML](/standards/gha-spvs-yaml.md)\n\n# Citations\n\n1. Workspace file: `/home/ghost/workspace-latest/gha-reusable-actions-workflows/README.md` (local clone; not a vault-relative link)"

      "id": "vault/systems/gha-reusable-actions-workflows",
      "type": "System",
      "title": "gha-reusable-actions-workflows",
      "description": "Monorepo for reusable GitHub Actions, reusable workflows, SPVS Conftest policies, and Release Manager lifecycle.",
      "tags": [
        "github-actions",
        "spvs",
        "release-manager",
        "monorepo",
        "system"
      ],
      "content": "# gha-reusable-actions-workflows\n\nWorkspace path: `/home/ghost/workspace-latest/gha-reusable-actions-workflows`\n\nMonorepo that publishes composite GitHub Actions and reusable workflows under an OWASP SPVS-aligned release plane (Validate -> Security -> Execute).\n\n## Directory map\n\n| Path | Role |\n| :--- | :--- |\n| `actions/{category}/{name}/` | Composite actions (`action.yml` + `readme.md` required) |\n| `workflows/{category}/{name}/` | Reusable workflows (one `workflow.yml` + `readme.md`) |\n| `policies/conftest/github_actions/` | Conftest Rego (namespaces `workflow` / `composite`) |\n| `policies/scripts/` | Commit-msg lib, hook installer, Conftest runners |\n| `.github/workflows/` | Release Manager + synced published workflows |\n| `.pre-commit-config.yaml` | Local Shellcheck, Bandit, Actionlint, SPVS Conftest |\n\n## Components (current clone)\n\n| Kind | Path |\n| :--- | :--- |\n| Action | `actions/common/semver` |\n| Action | `actions/common/drift-auditor` |\n| Action | `actions/common/git-path-filter` |\n| Action | `actions/common/issues-bot` |\n| Action | `actions/common/janitor-bot` |\n| Action | `actions/common/prbot` |\n| Action | `actions/security/owasp-dependency-check` |\n| Workflow | `workflows/common/dummy-workflow` |\n| Orchestrator | `.github/workflows/release-manager.yml` |\n\n## Release plane\n\nModes: `release` (sandbox versioned tag), `promote` (stable `{name}-v1`), `rollback` (previous versioned tag).\n\nTag patterns: `{safe_name}-{X.Y.Z}` and `{safe_name}-v1`.\n\nSecurity Stage 2 (release only): Conftest SPVS, Actionlint (workflows), Bandit (`*.py`), Shellcheck (`*.sh`).\n\n## Prerequisites\n\n- GitHub App secrets: `RELEASE_APP_ID`, `RELEASE_APP_PRIVATE_KEY` (`contents: write`, `workflows: write`)\n- Branch protection bypass for the App when syncing workflows to `main`\n\n## Prompt Card\n\n```text\nMonorepo: actions/{cat}/{name}/ (action.yml+readme.md); workflows/{cat}/{name}/\n(workflow.yml+readme.md); Rego in policies/conftest/github_actions/.\nRelease plane: release -> promote -> rollback; tags {safe_name}-{X.Y.Z} / -v1.\nNeeds GitHub App secrets RELEASE_APP_ID / RELEASE_APP_PRIVATE_KEY.\n```\n\n## Related\n\n- Concept: [GitHub Actions](/vault/concepts/github-actions.md)\n- Standards: [GHA commit subjects](/standards/gha-commit-subjects.md), [GHA SPVS YAML](/standards/gha-spvs-yaml.md), [GHA component layout](/standards/gha-component-layout.md), [OKF Prompt Injection](/standards/okf-prompt-injection.md)\n- Concepts: [Release Manager modes](/vault/concepts/release-manager-modes.md), [SemVer from commits](/vault/concepts/semver-from-commits.md), [SPVS lifecycle](/vault/concepts/spvs-lifecycle.md), [GHA YAML Anchors](/vault/concepts/gha-yaml-anchors.md)\n- Playbooks: [Release component](/vault/playbooks/release-gha-component.md), [Bootstrap SPVS env](/vault/playbooks/bootstrap-spvs-dev-environment.md)\n- Reference: [Repo README](/vault/references/gha-reusable-readme.md)"

    let hiddenTypes = new Set();     // toggled off via legend
    let selected = null;
    let view = { x: 0, y: 0, k: 1 };

    function resize() {
      canvas.width = innerWidth * devicePixelRatio;
      canvas.height = innerHeight * devicePixelRatio;
      canvas.style.width = innerWidth + "px";
      canvas.style.height = innerHeight + "px";
    }
    addEventListener("resize", resize); resize();

    function colorFor(type) {
      if (!typeColors.has(type)) typeColors.set(type, PALETTE[typeColors.size % PALETTE.length]);
      return typeColors.get(type);
    }

    /* ---------- data loading ---------- */

    function setGraph(data) {
      const byId = new Map();
      typeColors = new Map();
      nodes = (data.nodes || []).map((n, i) => {
        const angle = (i / Math.max(1, data.nodes.length)) * Math.PI * 2;
        const node = {
          ...n, color: colorFor(n.type || "?"),
          x: Math.cos(angle) * 260 + (Math.random() - .5) * 40,
          y: Math.sin(angle) * 260 + (Math.random() - .5) * 40,
          vx: 0, vy: 0, deg: 0,
        };
        byId.set(n.id, node);
        return node;
      });
      edges = (data.edges || [])
        .map(e => ({ s: byId.get(e.source), t: byId.get(e.target) }))

      view = { x: SIDEBAR_W + (innerWidth - SIDEBAR_W) / 2, y: TOPBAR_H + (innerHeight - TOPBAR_H) / 2, k: 1 };

    function setLint(data) {
      lint = data;
      lintByConcept = new Map();

        const prev = lintByConcept.get(f.concept);
        if (prev !== "error") lintByConcept.set(f.concept, f.severity);
      }
      applyLint(); renderLint(); renderNavigator();
    }

    function applyLint() {
      for (const n of nodes) n.lint = lintByConcept.get(n.id) || null;
    }

    function loadText(text, label) {
      let data;
      try { data = JSON.parse(text); }
      catch (err) { statusEl.textContent = `could not parse ${label}: ${err.message}`; return; }
      if (Array.isArray(data.nodes)) setGraph(data);
      else if (Array.isArray(data.findings)) setLint(data);
      else statusEl.textContent = `${label}: not a graph.json or lint.json`;
    }

    document.getElementById("filepick").addEventListener("change", e => {
      for (const f of e.target.files) f.text().then(t => loadText(t, f.name));
    });
    addEventListener("dragover", e => e.preventDefault());
    addEventListener("drop", e => {
      e.preventDefault();
      for (const f of e.dataTransfer.files) f.text().then(t => loadText(t, f.name));
    });
    /* Prefer data embedded by the vault scripts; fall back to fetch (served mode),
       then to the file picker / drag-and-drop. */
    function loadEmbedded(id, label) {
      const el = document.getElementById(id);
      const text = el ? el.textContent.trim() : "";
      if (!text || text === "null") return false;
      loadText(text, label);
      return true;
    }
    if (!loadEmbedded("graph-data", "embedded graph")) {
      fetch("graph.json")
        .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })

    /* ---------- legend (click to filter) ---------- */

    function renderLegend() {
      const legend = document.getElementById("legend");
      legend.innerHTML = "";
      for (const [type, color] of typeColors) {
        const el = document.createElement("div");
        el.className = "key" + (hiddenTypes.has(type) ? " off" : "");
        el.innerHTML = `<span class="dot" style="background:${color}"></span>${type}`;

        el.addEventListener("click", () => {
          hiddenTypes.has(type) ? hiddenTypes.delete(type) : hiddenTypes.add(type);

          renderLegend(); renderNavigator();

        legend.appendChild(el);

    /* ---------- navigator sidebar ---------- */

    function getZone(id) {
      const p = id.replace(/^knowledge\//, "");
      if (p.startsWith("_inbox")) return "Zone 1: Untriaged";
      if (p.startsWith("kernel")) return "Zone 2: Execution";
      if (p.startsWith("standards")) return "Zone 3: Governance";
      if (p.startsWith("vault")) return "Zone 4: Knowledge";
      return "Other";
    }

    function renderNavigator() {
      const list = document.getElementById("navlist");
      const q = document.getElementById("search").value.trim().toLowerCase();
      list.innerHTML = "";

      const groups = new Map();
      const zoneOrder = ["Zone 1: Untriaged", "Zone 2: Execution", "Zone 3: Governance", "Zone 4: Knowledge", "Other"];
      zoneOrder.forEach(z => groups.set(z, new Map()));

      for (const n of nodes) {
        if (hiddenTypes.has(n.type)) continue;
        if (q && !(n.title + " " + n.id).toLowerCase().includes(q)) continue;

        const zone = getZone(n.id);
        const zoneMap = groups.get(zone);

        // Group by directory within zone
        let parts = n.id.split("/");
        let folder = parts.length > 2 ? parts.slice(0, -1).join("/") : "root";
        if (!zoneMap.has(folder)) zoneMap.set(folder, []);
        zoneMap.get(folder).push(n);
      }

      for (const zoneName of zoneOrder) {
        const zoneMap = groups.get(zoneName);
        if (!zoneMap.size) continue;

        const zoneDet = document.createElement("details");
        zoneDet.className = "navgroup zone-group"; zoneDet.open = true;
        const zoneSum = document.createElement("summary");
        zoneSum.innerHTML = `<span class="nav-label" style="color:var(--accent)">${zoneName}</span>`;
        zoneDet.appendChild(zoneSum);

        for (const [folder, members] of [...zoneMap].sort()) {
          members.sort((a, b) => (a.title || a.id).localeCompare(b.title || b.id));

          const folderDet = document.createElement("details");
          folderDet.className = "navgroup folder-group"; folderDet.open = true;
          folderDet.style.marginLeft = "8px";
      const folderSum = document.createElement("summary");
      folderSum.innerHTML = `<span class="nav-label" style="opacity:0.8;font-size:12px;grid-column:2/4">${folder.replace(/^knowledge\//, "")} (${members.length})</span>`;
      folderDet.appendChild(folderSum);

          for (const n of members) {

            item.className = "navitem" + (selected === n ? " selected" : "");

    document.getElementById("search").addEventListener("input", renderNavigator);

    function selectNode(n, focus) {

        tween = {
          tx: SIDEBAR_W + (innerWidth - SIDEBAR_W - readerW) / 2 - n.x * Math.max(view.k, 1),
          ty: TOPBAR_H + (innerHeight - TOPBAR_H) / 2 - n.y * Math.max(view.k, 1),

    function renderDetails() {
      const el = document.getElementById("details");
      if (!selected) { el.style.display = "none"; return; }
      const n = selected;
      const findings = lint ? lint.findings.filter(f => f.concept === n.id) : [];
      el.style.display = "block";

        `<div class="d-meta">${n.type} &middot; ${n.id}.md &middot; ${n.deg} link(s)</div>` +
        findings.map(f =>
          `<div style="color:var(--${f.severity === "error" ? "error" : "warning"})">[${f.code}] ${f.message}</div>`
        ).join("");
    }

    /* ---------- reading pane (markdown content) ---------- */

    function readerOpen() { return !!(selected && typeof selected.content === "string"); }

    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    /* Resolve a markdown link target (bundle-absolute or relative) to a graph node. */
    function resolveMdLink(url, baseId) {
      if (/^([a-z]+:)?\/\//i.test(url) || /^(https?|mailto|file):/i.test(url)) return null;
      let path = url.split("#")[0];
      if (!path.endsWith(".md")) return null;
      path = path.slice(0, -3);
      let parts;
      if (path.startsWith("/")) parts = path.slice(1).split("/");
      else {
        parts = baseId.split("/").slice(0, -1);
        for (const seg of path.split("/")) {
          if (seg === "." || seg === "") continue;
          if (seg === "..") parts.pop();
          else parts.push(seg);
        }
      }
      const id = parts.join("/");
      return nodes.find(n => n.id === id) || null;
    }

    function mdInline(s, baseId) {
      s = escapeHtml(s);
      s = s.replace(/`([^`]+)`/g, (m, c) => `<code>${c}</code>`);
      s = s.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
      s = s.replace(/(^|[\s(])\*([^*\s][^*]*)\*/g, "$1<i>$2</i>");
      s = s.replace(/\[([^\]]*)\]\(([^)\s]+)\)/g, (m, text, url) => {
        const n = resolveMdLink(url, baseId);
        if (n) return `<a href="#" data-node="${n.id}" title="${n.id}.md">${text}</a>`;
        if (/^https?:/i.test(url)) return `<a href="${url}" target="_blank" rel="noopener">${text}</a>`;
        return `<a class="dead" title="${url} (not in bundle)">${text}</a>`;
      });
      return s;
    }

    /* Parse a markdown list line; returns null if not a list item. */
    function parseListLine(line) {
      const m = line.match(/^(\s*)([-*]|\d+\.)\s+(.*)/);
      return m ? { indent: m[1].length, marker: m[2], text: m[3] } : null;
    }

    /* Build nested <ul>/<ol> from lines starting at index i. */
    function buildList(lines, i, baseId) {
      const first = parseListLine(lines[i]);
      const baseIndent = first.indent;
      const ordered = /\d/.test(first.marker);
      const items = [];

      while (i < lines.length) {
        const cur = parseListLine(lines[i]);
        if (!cur) {
          const cont = lines[i].match(/^(\s+)(\S.*)$/);
          if (cont && cont[1].length > baseIndent && items.length) {
            const last = items[items.length - 1];
            last.extra.push(cont[2].trim());
            i++; continue;
          }
          break;
        }
        if (cur.indent < baseIndent) break;
        if (cur.indent > baseIndent) {
          const nested = buildList(lines, i, baseId);
          if (items.length) items[items.length - 1].nested = nested.html;
          i = nested.next;
          continue;
        }
        items.push({ text: cur.text, extra: [], nested: "" });
        i++;
        while (i < lines.length) {
          if (parseListLine(lines[i])) break;
          const cont = lines[i].match(/^(\s+)(\S.*)$/);
          if (cont && cont[1].length > baseIndent) {
            items[items.length - 1].extra.push(cont[2].trim());
            i++;
          } else break;
        }
      }

      const body = items.map(it => {
        let inner = mdInline(it.text, baseId);
        if (it.extra.length) {
          inner += it.extra.map(t => `<span class="li-cont">${mdInline(t, baseId)}</span>`).join("");
        }
        return `<li>${inner}${it.nested}</li>`;

      return { html: `<${tag}>${body}</${tag}>`, next: i };
    }

    /* Minimal markdown -> HTML: headings, fenced code, tables, lists, paragraphs. */
    function mdToHtml(md, baseId) {
      const lines = md.split("\n");
      const out = [];
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];
        if (line.trimStart().startsWith("```")) {
          const code = [];
          i++;
          while (i < lines.length && !lines[i].trimStart().startsWith("```")) code.push(lines[i++]);
          i++; // closing fence
          out.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
          continue;
        }
        const h = line.match(/^(#{1,4})\s+(.*)/);
        if (h) {
          out.push(`<h${h[1].length}>${mdInline(h[2], baseId)}</h${h[1].length}>`);
          i++; continue;
        }
        if (line.trim().startsWith("|") && i + 1 < lines.length &&
          /^\s*\|[\s|:-]+\|?\s*$/.test(lines[i + 1]) && lines[i + 1].includes("-")) {
          const cells = row => row.trim().replace(/^\||\|$/g, "").split("|").map(c => mdInline(c.trim(), baseId));
          const head = cells(line);
          i += 2;
          const rows = [];
          while (i < lines.length && lines[i].trim().startsWith("|")) rows.push(cells(lines[i++]));
          out.push("<table><thead><tr>" + head.map(c => `<th>${c}</th>`).join("") + "</tr></thead><tbody>" +
            rows.map(r => "<tr>" + r.map(c => `<td>${c}</td>`).join("") + "</tr>").join("") + "</tbody></table>");
          continue;
        }
        if (parseListLine(line)) {
          const list = buildList(lines, i, baseId);
          out.push(list.html);
          i = list.next;
          continue;
        }
        if (!line.trim()) { i++; continue; }
        const para = [];
        while (i < lines.length && lines[i].trim() &&
          !/^(#{1,4}\s|\s*([-*]|\d+\.)\s|\s*\||\s*```)/.test(lines[i])) {
          para.push(lines[i++]);
        }
        if (para.length) out.push(`<p>${mdInline(para.join(" "), baseId)}</p>`);
        else i++;
      }
      return out.join("\n");
    }

    function renderReader() {
      const el = document.getElementById("reader");
      if (!readerOpen()) { el.style.display = "none"; return; }
      const n = selected;
      document.getElementById("r-title").innerHTML =
        `<span class="dot" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${n.color};margin-right:6px"></span>` +
