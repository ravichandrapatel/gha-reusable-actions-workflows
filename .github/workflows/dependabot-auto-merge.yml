# =============================================================================
# FILE_NAME: dependabot-auto-merge.yml
# DESCRIPTION: Automatically approve and enable auto-merge for Dependabot PRs.
# ALIGNMENT: OWASP SPVS (Secure Pipeline Verification Standard) 1.0
# VERSION: 1.1.0
# EXIT_CODES/SIGNALS: 0 on success, 1 on failure.
# AUTHORS: DevOps Team
# =============================================================================

name: Dependabot Auto-Merge

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/release-manager.yml'
      - '.github/workflows/update-docs.yml'
      - '.github/workflows/dependabot-auto-merge.yml'
      - 'actions/**'
      - 'workflows/**'
      - 'requirements-dev.txt'

permissions:
  contents: read

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    env:
      SPVS_SKIP_POLICY: CKV2_SPVS_11
      SPVS_SKIP_REASON: "Dependabot auto-merge requires contents:write to enable auto-merge on PRs, but does not target a specific environment."
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@db33e7d94690d68a339ad7a17f305973d1eb25a9 # v2.3.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Approve and Enable Auto-Merge
        shell: bash
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          # [T-01] Approving PR: "$PR_URL"
          echo "[DBG-001] Approving Dependabot PR"
          gh pr review --approve "$PR_URL"
          
          # [T-02] Enabling auto-merge for PR
          echo "[DBG-002] Enabling auto-merge (merge mode)"
          gh pr merge --auto --merge "$PR_URL"
