name: Update Official Documentation

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  update-docs:
    runs-on: ubuntu-latest
    environment: documentation
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5.3.0
        with:
          python-version: '3.10'

      - name: Run update script
        run: |
          set -euo pipefail
          python3 -u scripts/update_docs.py

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add rulebooks/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update official documentation to latest versions"
            git push
          fi
