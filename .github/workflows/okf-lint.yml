# =============================================================================
# FILE_NAME: okf-lint.yml
# DESCRIPTION: CI gate — run okf.py lint (incl. standards Prompt Card check).
# ALIGNMENT: OWASP SPVS (Secure Pipeline Verification Standard) 1.0
# VERSION: 0.1.0
# EXIT_CODES/SIGNALS: 0 on success, 1 on failure.
# AUTHORS: contributors
# =============================================================================

name: OKF lint

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  okf-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Lint vault (Prompt Card gate)
        shell: bash
        working-directory: .github/agents
        run: |
          set -euo pipefail
          python3 -u _okf_knowledge/kernel/okf.py lint
