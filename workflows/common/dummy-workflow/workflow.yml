# =============================================================================
# FILE_NAME: workflow.yml
# DESCRIPTION: Dummy reusable workflow for release testing.
# VERSION: 1.0.0
# AUTHORS: DevOps Team
# =============================================================================

name: Dummy Reusable Workflow

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      message:
        description: 'A message to echo'
        required: false
        type: string
        default: 'Hello from Dummy Workflow'

jobs:
  echo_message:
    name: Echo Message
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Echo
        shell: bash
        env:
          MESSAGE: ${{ inputs.message }}
        run: |
          set -euo pipefail
          # [T-01] Echoing the input message
          echo "Message: ${MESSAGE}"
