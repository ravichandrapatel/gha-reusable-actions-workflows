# Syncs GitHub App auth from AWS Secrets Manager via ESO.
# Namespace comes from overlay `namespace:`.
#
# Target Secret keys must match gha-runner-scale-set expectations:
#   github_app_id, github_app_installation_id, github_app_private_key
#
# AWS Secrets Manager JSON:
#   {
#     "github_app_id": "123456",
#     "github_app_installation_id": "78901234",
#     "github_app_private_key": "-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----"
#   }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-arc-github-config
  labels:
    app.kubernetes.io/part-of: github-arc
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secretsmanager-github-arc
  target:
    name: github-arc-github-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: github-arc
          app.kubernetes.io/component: github-auth
      data:
        github_app_id: "{{ .github_app_id }}"
        github_app_installation_id: "{{ .github_app_installation_id }}"
        github_app_private_key: "{{ .github_app_private_key }}"
  dataFrom:
    - extract:
        key: REPLACE_ME_AWS_SECRET_NAME
