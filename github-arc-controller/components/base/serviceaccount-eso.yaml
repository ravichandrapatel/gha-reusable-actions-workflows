# ServiceAccount used by ClusterSecretStore (AWS SM via IRSA / ROSA STS).
# Overlay MUST set: metadata.annotations["eks.amazonaws.com/role-arn"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-arc-eso
  labels:
    app.kubernetes.io/part-of: github-arc
    app.kubernetes.io/component: external-secrets
  annotations:
    eks.amazonaws.com/role-arn: REPLACE_IAM_ROLE_ARN
---
# Allow ESO controller to mint projected tokens for this SA (JWT → AWS STS).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-arc-eso-tokenrequest
  labels:
    app.kubernetes.io/part-of: github-arc
    app.kubernetes.io/component: external-secrets
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: ["github-arc-eso"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-arc-eso-tokenrequest
  labels:
    app.kubernetes.io/part-of: github-arc
    app.kubernetes.io/component: external-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-arc-eso-tokenrequest
subjects:
  # Default OpenShift GitOps / ESO operator SA — adjust in overlay if your ESO SA differs
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets
