# Namespaced SecretStore (same ns as ARC). Overlay `namespace:` applies cleanly.
# IRSA SA: github-arc-eso (same namespace — no serviceAccountRef.namespace needed).
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager-github-arc
  labels:
    app.kubernetes.io/part-of: github-arc
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: github-arc-eso
