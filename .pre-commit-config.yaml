# Pre-commit hooks: SPVS security scans + commit message validation (shell only).
# Install: bash policies/scripts/install_dev_hooks.sh [--mode venv|pipx]
#          source .env
# Hooks:   global core.hooksPath (SPVS chained when policies/ exists in repo)
# Manual:  pre-commit run --all-files

minimum_pre_commit_version: "3.5.0"

repos:
  - repo: local
    hooks:
      - id: spvs-security-pre-commit
        name: SPVS security (Checkov, Shellcheck, Actionlint, Bandit)
        entry: bash policies/scripts/pre_commit_spvs_wrapper.sh
        language: system
        files: ^(actions/|workflows/|\.github/workflows/|policies/|\.checkov\.yaml)
        pass_filenames: true
        stages: [pre-commit]

      - id: validate-commit-message
        name: Validate commit message (ticket + conventional type)
        entry: bash policies/scripts/validate_commit_message.sh
        language: system
        stages: [commit-msg]
        pass_filenames: false
        always_run: true
