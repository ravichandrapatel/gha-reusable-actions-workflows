name: 'Terraform Drift Auditor'
description: 'Detect infrastructure drift across many Terraform workspaces (single S3 backend) in parallel on one runner. Creates/updates one GitHub Issue "Infrastructure Drift Report".'
inputs:
  working_dir:
    description: 'Terraform working directory (repo root or subdir, e.g. . or terraform)'
    required: false
    default: '.'
  vars_folder:
    description: 'Folder containing *.tfvars (relative to working_dir), e.g. envs or terraform/envs'
    required: true
  max_parallel:
    description: 'Max parallel terraform plans (1-10)'
    required: false
    default: '10'
  backend_config:
    description: 'Optional path to backend config file (relative to working_dir)'
    required: false
    default: ''
  terraform_version:
    description: 'Terraform version for setup-terraform'
    required: false
    default: '1.9.0'
  github_token:
    description: 'Token for GitHub API (create/update/close drift issue)' 
    required: false
    default: ${{ github.token }}
  repo:
    description: 'Owner/repo for drift issue (default: current repository)'
    required: false
    default: ${{ github.repository }}
  init_timeout:
    description: 'Timeout in seconds for terraform init (default 300)'
    required: false
    default: '300'
  plan_timeout:
    description: 'Timeout in seconds for terraform plan (default 600); increase for large/refresh-heavy runs'
    required: false
    default: '600'
  exclude:
    description: 'Expected drift patterns to exclude from drift count. Newline- or comma-separated, or JSON array. Each pattern matches if resource address contains it. Use "workspace:substring" to scope to one workspace.'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Run Terraform Drift Auditor
      id: drift
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        GITHUB_API_URL: ${{ github.api_url }}
        TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
        WORKING_DIR: ${{ inputs.working_dir }}
        VARS_FOLDER: ${{ inputs.vars_folder }}
        MAX_PARALLEL: ${{ inputs.max_parallel }}
        BACKEND_CONFIG: ${{ inputs.backend_config }}
        REPO: ${{ inputs.repo }}
        INIT_TIMEOUT: ${{ inputs.init_timeout }}
        PLAN_TIMEOUT: ${{ inputs.plan_timeout }}
        EXCLUDE: ${{ inputs.exclude }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        ARGS=(--working-dir "$WORKING_DIR" --vars-folder "$VARS_FOLDER" --max-parallel "$MAX_PARALLEL")
        [ -n "${BACKEND_CONFIG:-}" ] && ARGS+=(--backend-config "$BACKEND_CONFIG")
        [ -n "${GITHUB_TOKEN:-}" ] && ARGS+=(--github-token "$GITHUB_TOKEN")
        [ -n "${REPO:-}" ] && ARGS+=(--repo "$REPO")
        ARGS+=(--init-timeout "$INIT_TIMEOUT" --plan-timeout "$PLAN_TIMEOUT")
        [ -n "${EXCLUDE:-}" ] && ARGS+=(--exclude "$EXCLUDE")
        python3 -u "$ACTION_PATH/drift_auditor.py" "${ARGS[@]}"
      shell: bash

    - name: Upload drift report artifact
      if: always() && hashFiles('drift-report.md') != ''
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: drift-report
        path: drift-report.md
